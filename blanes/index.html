  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 14px; border: 1.5px solid #d0d8e4; border-radius: 20px;

  .doc-count { margin-left: auto; font-size: 13px; color: #8a9ab0; white-space: nowrap; }

  .section-group { margin-bottom: 32px; }
  .section-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: white;
    background: #2c4a6e; padding: 10px 18px; border-radius: 8px 8px 0 0;
    margin-bottom: 0;
  }

  .section-body { background: white; border-radius: 0 0 8px 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

  /* DOCUMENT ROW */
  .doc-row {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 18px; border-bottom: 1px solid #f0f3f7;
    transition: background .15s;
  }
  .doc-row:last-child { border-bottom: none; }
  .doc-row:hover { background: #f7fafd; }
  .doc-num {
    min-width: 34px; height: 34px; border-radius: 50%;
    background: #edf2f7; color: #4a5568; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;

  .doc-langs { display: flex; gap: 5px; flex-shrink: 0; }
  .lang-badge {

  .doc-link {

// ── State ──────────────────────────────────────────────────────────────────────
let activeFilter = "ALL";

// ── Build category filter buttons ─────────────────────────────────────────────
function buildFilters() {
  const wrap = document.getElementById("filters");
  const all = document.createElement("button");
  all.className = "filter-btn active";
  all.textContent = "All";
  all.onclick = () => setFilter("ALL", all);
  wrap.appendChild(all);

  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = cat.label;
    btn.onclick = () => setFilter(cat.key, btn);
    wrap.appendChild(btn);
  });
}

function setFilter(key, btn) {
  activeFilter = key;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderDocs();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderDocs() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  const main = document.getElementById("main");
  main.innerHTML = "";

  let totalVisible = 0;

  CATEGORIES.forEach(cat => {
    if (activeFilter !== "ALL" && activeFilter !== cat.key) return;

    const words = query.split(/\s+/).filter(Boolean);
    const filtered = DOCS.filter(d => {
      if (d.cat !== cat.key) return false;
      if (words.length) {
        const filename = d.file.split("/").pop().replace(/%23/g, "#").replace(/%20/g, " ");
        const fullText = (typeof SEARCH_INDEX !== "undefined" && SEARCH_INDEX[filename]) || "";
        const searchable = [d.title, d.cat, cat.label, d.lang.join(" "), fullText].join(" ").toLowerCase();
        if (!words.every(w => searchable.includes(w))) return false;
      }
      return true;
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const group = document.createElement("div");
    group.className = "section-group";

    const header = document.createElement("div");
    header.className = "section-title";
    header.innerHTML = `<span class="dot ${cat.dot}"></span>${cat.label} <span style="margin-left:auto;font-size:12px;font-weight:400;opacity:.8">${filtered.length} doc${filtered.length > 1 ? "s" : ""}</span>`;
    group.appendChild(header);

    const body = document.createElement("div");
    body.className = "section-body";

    filtered.forEach(doc => {
      const row = document.createElement("div");
      row.className = "doc-row";

      const numEl = document.createElement("div");
      numEl.className = "doc-num";
      numEl.textContent = doc.id;
      row.appendChild(numEl);

      const titleEl = document.createElement("div");
      titleEl.className = "doc-title";
      titleEl.textContent = doc.title;
      row.appendChild(titleEl);

      const langsEl = document.createElement("div");
      langsEl.className = "doc-langs";
      doc.lang.forEach(l => {
        const badge = document.createElement("span");
        badge.className = "lang-badge lang-" + l.toLowerCase();
        badge.textContent = l;
        langsEl.appendChild(badge);
      });
      row.appendChild(langsEl);

      const link = document.createElement("a");
      link.className = "doc-link";
      link.href = doc.file;
      link.target = "_blank";
      link.innerHTML = "&#128196; Open PDF";
      row.appendChild(link);

      body.appendChild(row);
    });

    group.appendChild(body);
    main.appendChild(group);
  });

  if (totalVisible === 0) {
    main.innerHTML = `<div class="no-results">No documents found for "<strong>${query}</strong>"</div>`;
  }

  document.getElementById("docCount").textContent = `${totalVisible} document${totalVisible !== 1 ? "s" : ""}`;
}

// ── Init ───────────────────────────────────────────────────────────────────────
buildFilters();
renderDocs();
</script>
</body>
</html>
